<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic AI Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        input[type="file"] {
            padding: 10px;
            background: white;
            color: black;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚦 Traffic AI Detector</h1>

    <p>Upload small video (3–5 seconds)</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="video/*" required>
        <button type="submit">Upload</button>
    </form>

    {% if result %}
        <div class="result">
            Traffic is <b>{{ result }}</b>
        </div>
    {% endif %}

    {% if audio_file %}
        <audio id="voicePlayer" controls>
            <source src="{{ audio_file }}" type="audio/mpeg">
        </audio>

        <br><br>

        <button onclick="playAudio()">🔊 Play Voice</button>

        <script>
            function playAudio() {
                document.getElementById("voicePlayer").play();
            }
        </script>
    {% endif %}

</div>

</body>
</html>
