<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic AI Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        form {
            margin-top: 30px;
        }

        input[type="file"] {
            padding: 10px;
            background: white;
            color: black;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #0072ff;
        }

        .result {
            margin-top: 30px;
            font-size: 24px;
        }

        audio {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚦 Traffic AI Detector</h1>

    <p>Upload a short video (3–5 seconds)</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="video/*" required>
        <button type="submit">Upload</button>
    </form>

    {% if result %}
        <div class="result">
            <p>Traffic is <b>{{ result }}</b></p>
        </div>
    {% endif %}

    {% if audio_file %}
        <audio id="voicePlayer" controls>
            <source src="{{ audio_file }}" type="audio/mpeg">
        </audio>

        <br>

        <button onclick="playAudio()">🔊 Play Voice</button>

        <script>
            function playAudio() {
                var audio = document.getElementById("voicePlayer");
                audio.play();
            }

            // Try autoplay
            window.onload = function() {
                var audio = document.getElementById("voicePlayer");
                if (audio) {
                    audio.play().catch(() => {
                        console.log("Autoplay blocked");
                    });
                }
            }
        </script>
    {% endif %}

</div>

</body>
</html>
