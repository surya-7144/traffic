<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic AI Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        input[type="file"] {
            padding: 10px;
            background: white;
            color: black;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚦 Traffic AI Detector</h1>

    <p>Upload small video (3–5 seconds)</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="video/*" required>
        <button type="submit">Upload</button>
    </form>

    {% if result %}
        <div class="result">
            Traffic is <b>{{ result }}</b>
        </div>

        <br>

        <button onclick="speak()">🔊 Speak</button>

        <script>
            function speak() {
                var text = "Traffic is {{ result }}";
                var speech = new SpeechSynthesisUtterance(text);
                speech.lang = "en-US";
                speech.rate = 1;
                speech.pitch = 1;

                window.speechSynthesis.speak(speech);
            }

            // Auto speak when page loads
            window.onload = function() {
                speak();
            }
        </script>
    {% endif %}

</div>

</body>
</html>
